<!DOCTYPE html>
<html>
<head>
  <title>Carte interactive D&D</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map { height: 100vh; width: 100vw; }
    .popup-form {
      display: flex;
      flex-direction: column;
    }
    .popup-form input {
      margin-bottom: 4px;
    }
    .popup-form button {
      margin-top: 4px;
    }
    #download-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      padding: 8px 12px;
      background-color: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="download-btn">Télécharger points.json</button>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const imageUrl = 'Telumnia et Elenest.png';
    const imageWidth = 2048;
    const imageHeight = 1182;

    const map = L.map('map', {
      crs: L.CRS.Simple,
      minZoom: -2,
    });

    const bounds = [[0, 0], [imageHeight, imageWidth]];
    L.imageOverlay(imageUrl, bounds).addTo(map);
    map.fitBounds(bounds);

    const markers = [];
    let savedPoints = [];

    // Charger les points depuis points.json
    fetch('points.json')
      .then(response => response.json())
      .then(data => {
        savedPoints = data;
        data.forEach(point => {
          const marker = L.marker(point.pos).addTo(map);
          const markerPopup = document.createElement('div');
          markerPopup.innerHTML = `<a href="${point.url}" target="_blank">${point.name}</a>`;

          const deleteBtn = document.createElement('button');
          deleteBtn.textContent = 'Supprimer';
          deleteBtn.style.marginTop = '5px';

          deleteBtn.addEventListener('click', () => {
            map.removeLayer(marker);
          });

          markerPopup.appendChild(document.createElement('br'));
          markerPopup.appendChild(deleteBtn);
          marker.bindPopup(markerPopup);
        });
      });

    // Ajouter un point avec un clic
    map.on('click', function(e) {
      const coords = e.latlng;
      console.log('Coordonnées:', coords);

      const popupContent = document.createElement('div');
      popupContent.className = 'popup-form';

      const inputName = document.createElement('input');
      inputName.placeholder = 'Nom du lieu';

      const inputURL = document.createElement('input');
      inputURL.placeholder = 'Lien vers la page Notion';

      const buttonAdd = document.createElement('button');
      buttonAdd.textContent = 'Ajouter';

      popupContent.appendChild(inputName);
      popupContent.appendChild(inputURL);
      popupContent.appendChild(buttonAdd);

      const popup = L.popup()
        .setLatLng(coords)
        .setContent(popupContent)
        .openOn(map);

      buttonAdd.addEventListener('click', () => {
        const name = inputName.value.trim();
        const url = inputURL.value.trim();

        if (name && url) {
          const marker = L.marker(coords).addTo(map);
          markers.push(marker);

          const markerPopup = document.createElement('div');
          markerPopup.innerHTML = `<a href="${url}" target="_blank">${name}</a>`;

          const deleteBtn = document.createElement('button');
          deleteBtn.textContent = 'Supprimer';
          deleteBtn.style.marginTop = '5px';

          deleteBtn.addEventListener('click', () => {
            map.removeLayer(marker);
          });

          markerPopup.appendChild(document.createElement('br'));
          markerPopup.appendChild(deleteBtn);

          marker.bindPopup(markerPopup);

          map.closePopup();

          const newPoint = {
            name: name,
            pos: [coords.lat, coords.lng],
            url: url
          };
          savedPoints.push(newPoint);
        }
      });
    });

    // Télécharger le JSON localement
    document.getElementById('download-btn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(savedPoints, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'points.json';
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
